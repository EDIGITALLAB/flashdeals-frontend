<!-- Filters Sidebar (Left) -->
<aside class="filters-sidebar">
  <div class="filter-group-header">
    <h3 class="filter-title-main">Filters</h3>
    <button class="clear-all-btn">Clear All</button>
  </div>

  <!-- Categories Filter -->
  <div class="filter-section">
    <h4 class="filter-section-title">Categories</h4>
    <div class="filter-options">
      <label class="checkbox-container">
        <input type="checkbox" checked>
        <span class="checkmark"></span>
        All
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Men
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Women
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Kids
      </label>
    </div>
  </div>

  <!-- Brands Filter -->
  <div class="filter-section">
    <h4 class="filter-section-title">Brands</h4>
    <div class="brand-search-box mb-3">
      <input type="text" class="brand-search-input" placeholder="Search brands">
    </div>
    <div class="filter-options">
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Nike (120)
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Adidas (98)
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Puma (76)
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Reebok (45)
      </label>
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        Skechers (34)
      </label>
      <button class="more-brands-btn">+ More</button>
    </div>
  </div>

  <!-- Discount Filter -->
  <div class="filter-section">
    <h4 class="filter-section-title">Discount</h4>
    <div class="slider-wrapper">
      <div class="slider-track-highlight" style="left: 0%; right: 28.5%;"></div>
      <input type="range" class="range-slider" min="10" max="100" value="80">
      <div class="slider-labels">
        <span>10%</span>
        <span>80%+</span>
      </div>
    </div>
  </div>

  <!-- Price Range Filter -->
  <div class="filter-section">
    <h4 class="filter-section-title">Price Range</h4>
    <div class="slider-wrapper">
      <div class="slider-track-highlight" style="left: 0%; right: 0%;"></div>
      <input type="range" class="range-slider" min="500" max="5000" value="5000">
      <div class="slider-labels">
        <span>₹500</span>
        <span>₹5000+</span>
      </div>
    </div>
  </div>

  <!-- Ratings Filter -->
  <div class="filter-section border-0 pb-0">
    <h4 class="filter-section-title">Ratings</h4>
    <div class="filter-options">
      <label class="checkbox-container">
        <input type="checkbox">
        <span class="checkmark"></span>
        4 ★ & above
      </label>
    </div>
  </div>
</aside>
