<!-- Header -->
<header class="top-header">
  <div class="search-container">
    <span class="material-symbols-outlined search-icon">search</span>
    <input type="text" class="search-input" placeholder="Search for brands, categories or deals...">
  </div>

  <div class="header-actions">
    <div class="location-picker">
      <span class="material-symbols-outlined loc-icon">location_on</span>
      <span class="location-name">Bengaluru</span>
      <span class="material-symbols-outlined dropdown-icon">keyboard_arrow_down</span>
    </div>

    <button class="icon-btn notification-btn">
      <span class="material-symbols-outlined">notifications</span>
      <span class="badge">3</span>
    </button>

    <button class="icon-btn wishlist-btn">
      <span class="material-symbols-outlined">favorite</span>
    </button>
  </div>
</header>
