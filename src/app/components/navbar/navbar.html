<!-- Header -->
<header class="top-header">
  <!-- Desktop search bar -->
  <div class="search-container">
    <span class="material-symbols-outlined search-icon">search</span>
    <input type="text" class="search-input" placeholder="Search for brands, categories or deals...">
  </div>

  <!-- Mobile search icon button (visible only on mobile) -->
  <button class="mobile-search-btn" (click)="toggleMobileSearch(); $event.stopPropagation()">
    <span class="material-symbols-outlined">search</span>
  </button>

  <div class="header-actions">
    <div class="location-picker-container">
      <div class="location-picker" (click)="toggleDropdown()">
        <span class="material-symbols-outlined loc-icon">location_on</span>
        <span class="location-name">{{ selectedLocation }}</span>
        <span class="material-symbols-outlined dropdown-icon" [class.rotated]="showDropdown">keyboard_arrow_down</span>
      </div>

      <!-- Dropdown Menu -->
      @if (showDropdown) {
        <div class="location-dropdown shadow-lg border">
          @for (loc of locations; track loc) {
            <div class="location-item" [class.active]="loc === selectedLocation" (click)="selectLocation(loc); $event.stopPropagation();">
              <span class="material-symbols-outlined check-icon" [style.visibility]="loc === selectedLocation ? 'visible' : 'hidden'">check</span>
              <span class="item-text">{{ loc }}</span>
            </div>
          }
        </div>
      }
    </div>

    <button class="icon-btn notification-btn" (click)="goToNotifications()">
      <span class="material-symbols-outlined">notifications</span>
      <span class="badge">3</span>
    </button>

    <button class="icon-btn wishlist-btn">
      <span class="material-symbols-outlined">favorite</span>
    </button>
  </div>
</header>

<!-- Mobile expandable search bar -->
@if (showMobileSearch) {
  <div class="mobile-search-overlay" (click)="$event.stopPropagation()">
    <div class="mobile-search-bar-container">
      <span class="material-symbols-outlined mobile-search-icon-inner">search</span>
      <input type="text" class="mobile-search-input" placeholder="Search brands, deals..." autofocus>
      <button class="mobile-search-close" (click)="toggleMobileSearch()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </div>
}
