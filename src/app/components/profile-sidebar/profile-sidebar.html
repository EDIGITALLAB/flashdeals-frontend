<div class="profile-card">
  <!-- Avatar details -->
  <div class="profile-header-user">
    <div class="avatar-circle">
      <svg viewBox="0 0 100 100" class="avatar-svg">
        <circle cx="50" cy="50" r="50" fill="#fde8ef"/>
        <path d="M 15 90 C 15 70, 35 65, 50 65 C 65 65, 85 70, 85 90 Z" fill="#ff3f6c" />
        <circle cx="50" cy="42" r="20" fill="#fed6c0"/>
        <path d="M 30 35 C 30 20, 70 20, 70 35 C 68 25, 32 25, 30 35" fill="#282c3f" stroke="#282c3f" stroke-width="4" stroke-linecap="round"/>
        <circle cx="43" cy="40" r="2" fill="#282c3f"/>
        <circle cx="57" cy="40" r="2" fill="#282c3f"/>
        <path d="M 45 50 Q 50 54 55 50" fill="none" stroke="#282c3f" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="user-meta-details">
      <h3 class="user-name">Rahul Sharma</h3>
      <p class="user-email">rahul.sharma@email.com</p>
      <p class="user-phone">+91 98765 43210</p>
      <button class="edit-profile-link" (click)="selectMenu('personal')">Edit Profile</button>
    </div>
  </div>

  <div class="profile-menu-section">
    <span class="menu-heading">Account</span>
    
    <button class="profile-menu-item" [class.active]="activeMenu === 'personal'" (click)="selectMenu('personal')">
      <span class="material-symbols-outlined menu-item-icon">person</span>
      <span class="menu-item-label">Personal Information</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'addresses'" (click)="selectMenu('addresses')">
      <span class="material-symbols-outlined menu-item-icon">location_on</span>
      <span class="menu-item-label">Addresses</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'payments'" (click)="selectMenu('payments')">
      <span class="material-symbols-outlined menu-item-icon">credit_card</span>
      <span class="menu-item-label">Payment Methods</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'preferences'" (click)="selectMenu('preferences')">
      <span class="material-symbols-outlined menu-item-icon">tune</span>
      <span class="menu-item-label">App Preferences</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'notifications'" (click)="selectMenu('notifications')">
      <span class="material-symbols-outlined menu-item-icon">notifications</span>
      <span class="menu-item-label">Notification Preferences</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'interests'" (click)="selectMenu('interests')">
      <span class="material-symbols-outlined menu-item-icon">favorite</span>
      <span class="menu-item-label">Manage Interests</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'privacy'" (click)="selectMenu('privacy')">
      <span class="material-symbols-outlined menu-item-icon">shield</span>
      <span class="menu-item-label">Privacy Settings</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>
  </div>

  <div class="profile-menu-section mt-4">
    <button class="profile-menu-item" [class.active]="activeMenu === 'help'" (click)="selectMenu('help')">
      <span class="material-symbols-outlined menu-item-icon">help</span>
      <span class="menu-item-label">Help & Support</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>

    <button class="profile-menu-item" [class.active]="activeMenu === 'about'" (click)="selectMenu('about')">
      <span class="material-symbols-outlined menu-item-icon">info</span>
      <span class="menu-item-label">About Us</span>
      <span class="material-symbols-outlined menu-arrow">chevron_right</span>
    </button>
  </div>

  <div class="profile-menu-section border-top mt-4 pt-3" style="display:flex; justify-content:center;">
    <button class="profile-menu-item logout-menu-btn" (click)="logout()" style="width:auto; justify-content:center; gap:8px;">
      <span class="material-symbols-outlined menu-item-icon text-danger">logout</span>
      <span class="menu-item-label text-danger" style="flex-grow:0;">Logout</span>
    </button>
  </div>
</div>
